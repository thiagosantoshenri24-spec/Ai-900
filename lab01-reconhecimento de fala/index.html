<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Azure Speech to Text</title>

    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Azure Speech SDK -->
    <script src="https://aka.ms/csspeech/jsbrowserpackageraw"></script>

    <style>
        body {
            background-color: #f1f3f5;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .status-indicator {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background-color: red;
            transition: 0.3s ease;
        }

        .status-listening {
            background-color: #28a745 !important;
            box-shadow: 0 0 10px #28a745;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8">

                <div class="card shadow-lg">
                    <div class="card-body">

                        <h2 class="text-center mb-4">🎤 Azure Speech to Text</h2>

                        <!-- Status -->
                        <div class="d-flex align-items-center justify-content-center mb-3">
                            <div id="statusCircle" class="status-indicator me-2"></div>
                            <span id="statusText">Parado</span>
                        </div>

                        <!-- Textarea -->
                        <div class="mb-3">
                            <textarea id="output" class="form-control" rows="6"
                                placeholder="O texto reconhecido aparecerá aqui..." readonly></textarea>
                        </div>

                        <!-- Buttons -->
                        <div class="text-center">
                            <button id="startBtn" class="btn btn-success me-2">Iniciar</button>
                            <button id="stopBtn" class="btn btn-danger" disabled>Parar</button>
                        </div>

                    </div>
                </div>

            </div>
        </div>
    </div>

    <script>
        /* ================================
           CONFIGURAÇÃO DO SERVIÇO
           ================================= */


        // 🔑 INSIRA AQUI SUA CHAVE DO AZURE
        const subscriptionKey = "1Enojl6m7b16stZ37GhjKD0q1RDjVBRTpLO53Ym8uZxDTjP5Fo1ZJQQJ99CCACHrzpqXJ3w3AAAYACOGtlY0";

        // 🌎 INSIRA AQUI SUA REGIÃO DO AZURE (ex: brazilsouth, eastus, westus)
        const serviceRegion = "northcentralus";
        let recognizer;
        let textoFinal = "";
        let textoParcial = "";

        /* ================================
           ELEMENTOS DA INTERFACE
           ================================= */

        const startBtn = document.getElementById("startBtn");
        const stopBtn = document.getElementById("stopBtn");
        const statusCircle = document.getElementById("statusCircle");
        const statusText = document.getElementById("statusText");
        const output = document.getElementById("output");

        /* ================================
           FUNÇÃO PARA ATUALIZAR TEXTAREA
           Mostra: textoFinal + textoParcial
           ================================= */
        function atualizarTexto() {
            output.value = textoFinal + textoParcial;
        }

        /* ================================
           CONTROLE DE STATUS VISUAL
           ================================= */
        function setStatusListening() {
            statusCircle.classList.add("status-listening");
            statusText.textContent = "Escutando...";
        }

        function setStatusStopped() {
            statusCircle.classList.remove("status-listening");
            statusText.textContent = "Parado";
        }

        /* ================================
           INICIAR RECONHECIMENTO
           ================================= */
        startBtn.addEventListener("click", () => {

            // Limpa textos para nova sessão
            textoFinal = "";
            textoParcial = "";
            atualizarTexto();

            // Configuração do serviço
            const speechConfig = SpeechSDK.SpeechConfig.fromSubscription(subscriptionKey, serviceRegion);
            speechConfig.speechRecognitionLanguage = "pt-BR";

            const audioConfig = SpeechSDK.AudioConfig.fromDefaultMicrophoneInput();

            recognizer = new SpeechSDK.SpeechRecognizer(speechConfig, audioConfig);

            /* ================================
               EVENTO recognizing
               Texto parcial (tempo real)
               NÃO deve ser salvo permanentemente
               ================================= */
            recognizer.recognizing = (s, e) => {
                textoParcial = e.result.text;
                atualizarTexto();
            };

            /* ================================
               EVENTO recognized
               Texto final reconhecido
               Deve ser acumulado
               ================================= */
            recognizer.recognized = (s, e) => {
                if (e.result.reason === SpeechSDK.ResultReason.RecognizedSpeech) {
                    textoFinal += e.result.text + " ";
                    textoParcial = "";
                    atualizarTexto();
                }
            };

            /* ================================
               INICIAR RECONHECIMENTO CONTÍNUO
               ================================= */
            recognizer.startContinuousRecognitionAsync();

            // Atualizar interface
            setStatusListening();
            startBtn.disabled = true;
            stopBtn.disabled = false;
        });

        /* ================================
           PARAR RECONHECIMENTO
           ================================= */
        stopBtn.addEventListener("click", () => {

            if (recognizer) {
                recognizer.stopContinuousRecognitionAsync(() => {
                    recognizer.close();
                    recognizer = undefined;
                });
            }

            setStatusStopped();
            startBtn.disabled = false;
            stopBtn.disabled = true;
        });

    </script>

</body>

</html>
